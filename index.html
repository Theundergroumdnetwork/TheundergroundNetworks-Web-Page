<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Underground Network - Link Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f15 0%, #000 100%);
      color: #d0f0ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 2.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(0, 255, 200, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .logo-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 1.8rem;
      border: 2px solid rgba(0, 255, 208, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 208, 0.25);
      transition: all 0.3s ease;
    }

    .logo-circle:hover {
      transform: scale(1.1);
      border-color: #00ffd0;
      box-shadow: 0 0 30px rgba(0, 255, 208, 0.45);
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: -0.03em;
      text-shadow: 0 0 10px rgba(0, 255, 208, 0.3);
    }

    .subtitle {
      font-size: 1.05rem;
      color: #88ccff;
      margin-bottom: 3rem;
      opacity: 0.85;
    }

    .container {
      max-width: 440px;
      width: 100%;
    }

    .section-title {
      font-size: 1.15rem;
      color: #66aaff;
      margin: 2.5rem 0 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(102, 170, 255, 0.4);
    }

    button {
      width: 100%;
      padding: 1.2rem;
      margin: 0.7rem 0;
      font-size: 1.15rem;
      font-weight: 500;
      color: #e0faff;
      background: rgba(10, 20, 30, 0.7);
      border: 1px solid #004d40;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    button:hover {
      background: rgba(20, 40, 50, 0.9);
      border-color: #00ffd0;
      box-shadow: 0 0 20px rgba(0, 255, 208, 0.35);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .active {
      border-color: #00b894;
      background: rgba(0, 184, 148, 0.08);
    }

    .inactive {
      color: #668899;
      cursor: not-allowed;
      opacity: 0.5;
      border-color: #333;
    }

    .inactive:hover {
      background: rgba(10, 20, 30, 0.7);
      box-shadow: none;
      transform: none;
    }

    @media (max-width: 500px) {
      h1 { font-size: 2.4rem; }
      .logo-circle { width: 80px; height: 80px; }
      button { padding: 1rem; font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <div class="logo-circle">
    <img 
      src="logo_circle.png" 
      alt="The Underground Network Logo" 
    />
  </div>

  <div class="container">
    <h1>Underground Link Hub</h1>
    <div class="subtitle">(Click again if popup blocks — stay hidden)</div>

    <button class="active" onclick="openInBlank('https://nebula-x-site-mocha.vercel.app/index.html')">
      Open Nebula Tools
    </button>

    <div class="section-title">Active Nodes</div>

    <button class="active" onclick="openInBlank('https://theunblockman.github.io/Iframe-ambient/')">
      Unblocked Browser
    </button>

    <button class="active" onclick="openInBlank('https://duck.tinyexams.com/#google_vignette')">
      Ducky Math
    </button>

    <button class="active" onclick="openInBlank('https://classroomgame.github.io/')">
      Classroom Games
    </button>

    <button class="active" onclick="openInBlank('https://eaglercraft.com/')">
      Eaglercraft (Minecraft)
    </button>

    <button class="active" onclick="openInBlank('https://lichess.org/')">
      Lichess Chess
    </button>

    <div class="section-title">Offline Nodes</div>

    <button class="inactive" disabled>Free Proxy (offline)</button>
    <button class="inactive" disabled>Example7 (offline)</button>
    <button class="inactive" disabled>Example8 (offline)</button>
    <button class="inactive" disabled>Example9 (offline)</button>
    <button class="inactive" disabled>Example10 (offline)</button>
    <button class="inactive" disabled>Example11 (offline)</button>
    <button class="inactive" disabled>Example12 (offline)</button>
    <button class="inactive" disabled>Example13 (offline)</button>
    <button class="inactive" disabled>Example14 (offline)</button>
  </div>

  <script>
    function openInBlank(url) {
      try {
        const win = window.open('about:blank', '_blank');
        if (win) {
          win.document.write(`
            <!DOCTYPE html>
            <html style="height:100%;margin:0;">
              <body style="margin:0;height:100%;background:#000;">
                <iframe src="${url}" frameborder="0" style="width:100%;height:100vh;border:none;"></iframe>
              </body>
            </html>
          `);
          win.document.close();
        } else {
          alert("Popup blocked — allow popups for this domain and retry.");
        }
      } catch (e) {
        console.error(e);
      }
    }
  </script>

</body>
</html>
